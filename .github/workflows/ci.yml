name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig version
      - name: Restore Zig cache
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache
            zig-out
          key: zig-${{ runner.os }}-lint-${{ hashFiles('build.zig', 'build.zig.zon', 'tools/lint/**', 'src/**', 'apps/**', 'tests/**') }}
          restore-keys: |
            zig-${{ runner.os }}-lint-
      - name: Format check
        run: zig build fmt-check
      - name: Lint (strict / naming / imports / docs / unused / mirror / testing-allocator)
        run: zig build lint

  test:
    name: Test (Linux, ${{ matrix.mode }})
    runs-on: ubuntu-latest
    # gero is pure Zig with no OS-specific I/O — runtime divergence
    # across OSes is vanishingly rare. Cross-target *compile* on macOS,
    # Windows, and wasm32-wasi is covered by the `cross-targets` job
    # below; that catches platform-level breakage without paying for
    # full test runs everywhere. If a consumer ever surfaces a
    # macOS/Windows runtime regression, add OS cells back here.
    strategy:
      fail-fast: false
      matrix:
        mode: [Debug, ReleaseSafe, ReleaseFast, ReleaseSmall]
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Restore Zig cache
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache
            zig-out
          # One cache slot per release mode — each optimization level
          # produces distinct artifacts that can't share the cache.
          key: zig-${{ runner.os }}-test-${{ matrix.mode }}-${{ hashFiles('build.zig', 'build.zig.zon', 'src/**', 'apps/**', 'tests/**') }}
          restore-keys: |
            zig-${{ runner.os }}-test-${{ matrix.mode }}-
      # `install` builds the CLI (`zig-out/bin/gero`); `test` builds +
      # runs the test artifacts. Chaining in one invocation amortizes
      # the build-graph evaluation cost across both targets.
      - name: Build + test
        run: zig build install test -Doptimize=${{ matrix.mode }} -freference-trace

  cross-targets:
    name: Cross-target compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Restore Zig cache
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache
            zig-out
          key: zig-${{ runner.os }}-cross-${{ hashFiles('build.zig', 'build.zig.zon', 'src/**', 'apps/**', 'tests/**') }}
          restore-keys: |
            zig-${{ runner.os }}-cross-
      - name: test-all (compile-only on extra targets)
        run: zig build test-all -freference-trace

  examples:
    name: Example integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Restore Zig cache
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache
            zig-out
          # `examples` runs with the default (Debug) build, so share
          # the cache slot with the Debug test cell.
          key: zig-${{ runner.os }}-test-Debug-${{ hashFiles('build.zig', 'build.zig.zon', 'src/**', 'apps/**', 'tests/**') }}
          restore-keys: |
            zig-${{ runner.os }}-test-Debug-
            zig-${{ runner.os }}-examples-
      - name: check-examples (parse + codegen-validate each example)
        run: zig build check-examples -freference-trace
      - name: check-broken (assert intentionally-bad fixtures fail)
        run: zig build check-broken -freference-trace
      - name: fmt-check-examples (every example is canonical)
        run: zig build fmt-check-examples -freference-trace
      - name: test-examples (assemble + run + diff + round-trip each example)
        run: zig build test-examples -freference-trace
