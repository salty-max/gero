name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig version
      - name: Format check
        run: zig build fmt-check
      - name: Imports
        run: bash scripts/check-imports.sh
      - name: Unused exports
        run: bash scripts/check-unused.sh
      - name: Strict (anyerror, *anyopaque, casts, debug.print)
        run: bash scripts/check-strict.sh
      - name: Mirror layout
        run: bash scripts/check-mirror.sh
      - name: Testing allocator
        run: bash scripts/check-testing-allocator.sh
      - name: Doc comments
        run: bash scripts/check-docs.sh
      - name: Naming convention
        run: bash scripts/check-naming.sh

  test:
    name: Test (Linux, ${{ matrix.mode }})
    runs-on: ubuntu-latest
    # gero is pure Zig with no OS-specific I/O — runtime divergence
    # across OSes is vanishingly rare. Cross-target *compile* on macOS,
    # Windows, and wasm32-wasi is covered by the `cross-targets` job
    # below; that catches platform-level breakage without paying for
    # full test runs everywhere. If a consumer ever surfaces a
    # macOS/Windows runtime regression, add OS cells back here.
    strategy:
      fail-fast: false
      matrix:
        mode: [Debug, ReleaseSafe, ReleaseFast, ReleaseSmall]
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build
        run: zig build -Doptimize=${{ matrix.mode }} -freference-trace
      - name: Test
        run: zig build test -Doptimize=${{ matrix.mode }} -freference-trace

  cross-targets:
    name: Cross-target compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: test-all (compile-only on extra targets)
        run: zig build test-all -freference-trace

  examples:
    name: Example integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: test-examples (assemble + run + diff + round-trip each example)
        run: zig build test-examples -freference-trace
