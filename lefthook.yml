# Git hooks managed by lefthook.
#
# Three hook layers:
#   commit-msg → conventional commit format (convco + scope-mandatory wrapper)
#   pre-commit → fast per-file checks on staged .zig / .gas files
#   pre-push   → full test suite + whole-tree lint
#
# Bypass with --no-verify only with a justified reason in the PR description.

commit-msg:
  commands:
    convco:
      run: bash scripts/commit-msg.sh {1}

pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.zig"
      run: zig fmt --check {staged_files}
    lint:
      glob: "*.zig"
      # Per-file mode skips the cross-file rules (unused / mirror) —
      # those need the whole tree and run in pre-push.
      run: ./zig-out/bin/gero-lint {staged_files}
    gero-check:
      glob: "*.gas"
      run: ./zig-out/bin/gero check --quiet {staged_files}
    gero-fmt:
      glob: "*.gas"
      run: ./zig-out/bin/gero fmt --check --quiet {staged_files}

pre-push:
  parallel: true
  commands:
    test:
      run: zig build test
    lint:
      run: zig build lint
