# Git hooks managed by lefthook.
#
# Three hook layers:
#   commit-msg → conventional commit format (convco + scope-mandatory wrapper)
#   pre-commit → fast per-file checks on staged .zig files
#   pre-push   → full test suite + whole-tree checks
#
# Hooks reference scripts/check-*.sh that arrive in their own Phase 0 PRs;
# entries below land alongside their scripts. The current set covers what
# already exists on main: convco-wrapper, zig fmt, zig build test.
#
# Bypass with --no-verify only with a justified reason in the PR description.

commit-msg:
  commands:
    convco:
      run: bash scripts/commit-msg.sh {1}

pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.zig"
      run: zig fmt --check {staged_files}
    imports:
      glob: "*.zig"
      run: bash scripts/check-imports.sh {staged_files}
    strict:
      glob: "*.zig"
      run: bash scripts/check-strict.sh {staged_files}
    gero-check:
      glob: "*.gas"
      run: ./zig-out/bin/gero check --quiet {staged_files}
    gero-fmt:
      glob: "*.gas"
      run: ./zig-out/bin/gero fmt --check --quiet {staged_files}

pre-push:
  parallel: true
  commands:
    test:
      run: zig build test
    unused:
      run: bash scripts/check-unused.sh
    mirror:
      run: bash scripts/check-mirror.sh
    testing-allocator:
      run: bash scripts/check-testing-allocator.sh
    docs:
      run: bash scripts/check-docs.sh
    naming:
      run: bash scripts/check-naming.sh
